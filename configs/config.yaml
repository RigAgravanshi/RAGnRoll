data:
  raw_path: "data/processed/cleaned_spotify_1M.csv"
  processed_path: "data/processed/final_processed_tracks.csv"
  metadata_path: "data/indexes/track_metadata.parquet"
  metadata_slim_path: "data/indexes/track_metadata_slim.parquet"

indexing:
  embeddings_path: "data/indexes/embeddings.npy"
  faiss_index_path: "data/indexes/faiss.index"
  model_name: "BAAI/bge-small-en-v1.5"
  batch_size: 512
  embedding_dim: 384

retrieval:
  llm_model: "llama-3.1-8b-instant"
  llm_temperature: 0.0

ranking:
  mood_score_weight: 0.8
  similarity_weight: 0.2
